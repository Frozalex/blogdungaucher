name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            /usr/local/bin/deploy-site.sh

      - name: Push notification (OneSignal)
        if: success()
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEYS: ${{ secrets.ONESIGNAL_API_KEYS }}
        run: |
          set -euo pipefail
          if ! git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            echo "Pas de nouvel article"
            exit 0
          fi
          CONTENT_FILES=$(git diff --name-only HEAD~1 HEAD | grep '^src/content/' || true)
          if [ -z "$CONTENT_FILES" ]; then
            echo "Pas de nouvel article"
            exit 0
          fi
          MD_FILES=$(echo "$CONTENT_FILES" | grep '\.md$' || true)
          if [ -z "$MD_FILES" ]; then
            echo "Pas de nouvel article"
            exit 0
          fi
          TARGET=$(echo "$MD_FILES" | sort | head -1)
          if [ -z "${ONESIGNAL_APP_ID:-}" ] || [ -z "${ONESIGNAL_API_KEYS:-}" ]; then
            echo "ONESIGNAL_APP_ID ou ONESIGNAL_API_KEYS absent — notification ignorée."
            exit 0
          fi
          TITLE=$(awk '/^---$/{d++;if(d>=2)exit;next}d==1&&/^title:/{line=$0;sub(/^title:[[:space:]]+/,"",line);if(line~/^".*"$/){line=substr(line,2,length(line)-2)}print line;exit}' "$TARGET")
          if [ -z "$TITLE" ]; then
            TITLE="Nouvel article"
          fi
          BODY_FR="Nouvel article publié sur Blog d'un Gaucher"
          PAYLOAD="$(jq -n \
            --arg app_id "$ONESIGNAL_APP_ID" \
            --arg title "$TITLE" \
            --arg body "$BODY_FR" \
            --arg url "https://blogdungaucher.com/fr/" \
            '{
              app_id: $app_id,
              included_segments: ["All"],
              headings: { fr: $title, en: $title },
              contents: { fr: $body, en: $body },
              url: $url,
              web_url: $url
            }')"
          curl -sS -f -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "Authorization: Key ${ONESIGNAL_API_KEYS}" \
            -d "$PAYLOAD"
