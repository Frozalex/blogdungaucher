name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            /usr/local/bin/deploy-site.sh

      - name: Push notification (OneSignal)
        if: success()
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEYS: ${{ secrets.ONESIGNAL_API_KEYS }}
        run: |
          set -euo pipefail
          if [ -z "${ONESIGNAL_APP_ID:-}" ] || [ -z "${ONESIGNAL_API_KEYS:-}" ]; then
            echo "ONESIGNAL_APP_ID ou ONESIGNAL_API_KEYS absent — notification ignorée."
            exit 0
          fi
          TITLE="$(git log -1 --pretty=%s)"
          if [ -z "$TITLE" ]; then
            TITLE="Déploiement blogdungaucher.com"
          fi
          PAYLOAD="$(jq -n \
            --arg app_id "$ONESIGNAL_APP_ID" \
            --arg title "$TITLE" \
            --arg url "https://blogdungaucher.com/fr/" \
            '{
              app_id: $app_id,
              included_segments: ["All"],
              headings: { fr: $title, en: $title },
              contents: { fr: "Le blog a été mis à jour.", en: "The blog has been updated." },
              url: $url,
              web_url: $url
            }')"
          curl -sS -f -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "Authorization: Key ${ONESIGNAL_API_KEYS}" \
            -d "$PAYLOAD"
