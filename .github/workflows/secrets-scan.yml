# Scan TruffleHog : détecte clés API, PEM, etc. dans l’historique et le working tree.
# En cas de finding : révoquer le secret, purge git si nécessaire, régénérer.

name: Secret scan (TruffleHog)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.95.3
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
