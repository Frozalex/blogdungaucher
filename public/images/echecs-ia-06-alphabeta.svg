<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180" role="img" aria-labelledby="t6"><title id="t6">Élagage alpha-bêta  -  branches coupées sans changer la décision</title>
<rect fill="#e7f5ff" width="400" height="180"/>
<text x="200" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#1864ab" font-family="system-ui,sans-serif">Alpha-bêta : couper l’inutile</text>
<line x1="30" y1="90" x2="370" y2="90" stroke="#1971c2" stroke-width="3"/>
<line x1="80" y1="50" x2="80" y2="130" stroke="#868e96" stroke-dasharray="6 4"/>
<line x1="140" y1="50" x2="140" y2="130" stroke="#868e96" stroke-dasharray="6 4"/>
<line x1="220" y1="50" x2="220" y2="130" stroke="#fa5252" stroke-width="2"/>
<text x="220" y="45" text-anchor="middle" font-size="10" fill="#c92a2a" font-family="system-ui,sans-serif">coupure</text>
<text x="200" y="155" text-anchor="middle" font-size="11" fill="#1864ab" font-family="system-ui,sans-serif">Branches ignorées quand elles ne peuvent plus battre le meilleur score connu</text>
<text x="200" y="172" text-anchor="middle" font-size="10" fill="#495057" font-family="system-ui,sans-serif">Ordre des coups : crucial pour aller plus loin en profondeur</text>
</svg>
